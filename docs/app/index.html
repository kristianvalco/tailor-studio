<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/tailor-studio/app/favicon.svg" type="image/svg+xml" />
    <title>Tailor Studio</title>
    <script type="module" crossorigin src="/tailor-studio/app/assets/index-D4P-4qZE.js"></script>
    <link rel="stylesheet" crossorigin href="/tailor-studio/app/assets/index-CSzVpS6j.css">
  </head>
  <body>
    <div id="app"></div>
    <!-- Apply the saved theme before Vue mounts to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('tailor-studio:settings:v1') || '{}')
          var theme = s.theme || 'dark'
          var dark = theme === 'dark' || (theme === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </body>
</html>
